services:
  - type: web
    name: scai-prospectops-api
    runtime: python
    buildCommand: pip install -e .
    startCommand: python -m backend.main ui
    plan: starter
    envVars:
      - key: UI_HOST
        value: 0.0.0.0
      - key: UI_PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.0
      # Set these in the Render dashboard (sensitive):
      # OPENAI_API_KEY, TAVILY_API_KEY, PERPLEXITY_API_KEY
      # UNIPILE_API_KEY, UNIPILE_DSN, UNIPILE_ACCOUNT_ID
      # ZEROBOUNCE_API_KEY, SPREADSHEET_ID
      # GOOGLE_SERVICE_ACCOUNT_JSON_CONTENT (paste the full JSON as a string)
